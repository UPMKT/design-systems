<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
  <div style="display:grid; grid-template-columns:repeat(5,1fr); gap:8px;">
    <div class="swatch" style="background:#000; color:#fff; min-height:100px;"><div><div class="name">Black</div></div><div class="val">#000000</div></div>
    <div class="swatch" style="background:var(--ink); color:#fff; min-height:100px;"><div><div class="name">Ink</div></div><div class="val">#0A0A0F</div></div>
    <div class="swatch" style="background:var(--graphite); color:#fff; min-height:100px;"><div><div class="name">Graphite</div></div><div class="val">#1A1A22</div></div>
    <div class="swatch" style="background:var(--slate); color:#fff; min-height:100px;"><div><div class="name">Slate</div></div><div class="val">#3D3D47</div></div>
    <div class="swatch" style="background:var(--steel); color:#fff; min-height:100px;"><div><div class="name">Steel</div></div><div class="val">#6B6B75</div></div>
    <div class="swatch" style="background:var(--mute); color:#fff; min-height:90px;"><div><div class="name">Mute</div></div><div class="val">#9A9AA3</div></div>
    <div class="swatch" style="background:var(--line); color:var(--ink); min-height:90px;"><div><div class="name">Line</div></div><div class="val">#E4E4E9</div></div>
    <div class="swatch" style="background:var(--paper); color:var(--ink); border:1px solid var(--line); min-height:90px;"><div><div class="name">Paper</div></div><div class="val">#F4F4F6</div></div>
    <div class="swatch" style="background:var(--bone); color:var(--ink); border:1px solid var(--line); min-height:90px;"><div><div class="name">Bone</div></div><div class="val">#FAFAFB</div></div>
    <div class="swatch" style="background:#fff; color:var(--ink); border:1px solid var(--line); min-height:90px;"><div><div class="name">White</div></div><div class="val">#FFFFFF</div></div>
  </div>
</body></html>
