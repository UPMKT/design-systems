<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:22px;">
  <div style="display:flex; align-items:flex-end; gap:10px;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:4px; height:4px; background:var(--ink);"></div><div class="meta">4</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:8px; height:8px; background:var(--ink);"></div><div class="meta">8</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:12px; height:12px; background:var(--ink);"></div><div class="meta">12</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:16px; height:16px; background:var(--ink);"></div><div class="meta">16</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:24px; height:24px; background:var(--ink);"></div><div class="meta">24</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:32px; height:32px; background:var(--ink);"></div><div class="meta">32</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:48px; height:48px; background:var(--ink);"></div><div class="meta">48</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:64px; height:64px; background:var(--ink);"></div><div class="meta">64</div></div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:6px;"><div style="width:96px; height:96px; background:var(--ink);"></div><div class="meta">96</div></div>
  </div>
  <div class="meta" style="margin-top:16px;">4-px base grid. Use semantic tokens <span class="mono">--s-1</span> through <span class="mono">--s-24</span>.</div>
</body></html>
