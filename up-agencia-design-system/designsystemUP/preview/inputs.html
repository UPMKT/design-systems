<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:28px;">
  <div style="display:flex; flex-direction:column; gap:12px; max-width:520px;">
    <label style="display:flex; flex-direction:column; gap:6px;">
      <span style="font-size:13px; font-weight:600; color:var(--fg-1);">Nome</span>
      <input placeholder="Como podemos te chamar?" style="padding:12px 14px; border:1px solid var(--line); border-radius:8px; font-family:var(--font-body); font-size:15px; background:#fff; color:var(--ink); outline:none;">
    </label>
    <label style="display:flex; flex-direction:column; gap:6px;">
      <span style="font-size:13px; font-weight:600; color:var(--fg-1);">E-mail</span>
      <input value="lucas@marca.com.br" style="padding:12px 14px; border:2px solid var(--up-blue); border-radius:8px; font-family:var(--font-body); font-size:15px; background:#fff; color:var(--ink); outline:none; box-shadow:0 0 0 4px rgba(49,60,240,.12);">
      <span class="meta" style="color:var(--up-blue); font-weight:500;">— focused state</span>
    </label>
    <label style="display:flex; flex-direction:column; gap:6px;">
      <span style="font-size:13px; font-weight:600; color:var(--fg-1);">Projeto</span>
      <textarea placeholder="Conta o que você tem em mente." rows="2" style="padding:12px 14px; border:1px solid var(--line); border-radius:8px; font-family:var(--font-body); font-size:15px; background:#fff; color:var(--ink); outline:none; resize:vertical;"></textarea>
    </label>
  </div>
</body></html>
