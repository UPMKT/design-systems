<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body>
  <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:10px;">
    <div class="swatch" style="background:var(--up-blue); color:#fff; min-height:120px;">
      <div><div class="name">UP Blue</div><div style="font-size:11px; opacity:.85;">Primary</div></div>
      <div class="val">#313CF0</div>
    </div>
    <div class="swatch" style="background:var(--up-blue-hover); color:#fff; min-height:120px;">
      <div><div class="name">UP Blue / Hover</div></div>
      <div class="val">#2730D0</div>
    </div>
    <div class="swatch" style="background:var(--up-blue-press); color:#fff; min-height:120px;">
      <div><div class="name">UP Blue / Press</div></div>
      <div class="val">#1E25A8</div>
    </div>
    <div class="swatch" style="background:var(--up-blue-tint); color:var(--up-blue-press); border:1px solid var(--line); min-height:90px;">
      <div><div class="name">Blue Tint</div></div>
      <div class="val">#EDEEFF</div>
    </div>
    <div class="swatch" style="background:var(--up-blue-soft); color:var(--up-blue-press); min-height:90px;">
      <div><div class="name">Blue Soft</div></div>
      <div class="val">#C8CCFB</div>
    </div>
    <div class="swatch" style="background:#fff; border:1px solid var(--line); color:var(--ink); min-height:90px;">
      <div><div class="name">On-blue text</div><div style="font-size:11px; color:var(--fg-3);">Always white</div></div>
      <div class="val">#FFFFFF</div>
    </div>
  </div>
</body></html>
