<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:28px;">
  <div style="display:flex; flex-direction:column; gap:18px; align-items:flex-start;">
    <div style="display:flex; align-items:baseline; gap:10px; font-family:var(--font-mono);">
      <span style="font-size:40px; color:var(--ink); font-weight:500;">000.0%</span>
      <span style="font-size:16px; color:var(--fg-3);">→ tabular, zero with slash</span>
    </div>
    <div style="font-family:var(--font-mono); font-size:13px; background:var(--bg-3); padding:14px 16px; border-radius:6px; border:1px solid var(--line); width:100%; box-sizing:border-box;">
<span style="color:var(--steel);">// POST /api/contact</span><br>
<span style="color:var(--up-blue); font-weight:600;">const</span> project = { brand: <span style="color:var(--ok);">"UP"</span>, year: 2026 };
    </div>
    <div class="meta">JetBrains Mono — numbers, code, raw data. Never for running copy.</div>
  </div>
</body></html>
