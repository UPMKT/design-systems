<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:28px; background:#FAFAFB;">
  <div style="display:grid; grid-template-columns:repeat(6,1fr); gap:14px;">
    <!-- Solid variants -->
    <div style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; display:flex; align-items:center; justify-content:center; aspect-ratio:1;"><img src="../assets/arrow-blue.png" style="width:56px; height:auto;"></div>
    <div style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; display:flex; align-items:center; justify-content:center; aspect-ratio:1;"><img src="../assets/arrow-black.png" style="width:56px; height:auto;"></div>
    <div style="background:var(--ink); border-radius:8px; padding:14px; display:flex; align-items:center; justify-content:center; aspect-ratio:1;"><img src="../assets/arrow-white.png" style="width:56px; height:auto;"></div>
    <!-- Outline variants -->
    <div style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; display:flex; align-items:center; justify-content:center; aspect-ratio:1;"><img src="../assets/arrow-outline-blue.png" style="width:56px; height:auto;"></div>
    <div style="background:#fff; border:1px solid var(--line); border-radius:8px; padding:14px; display:flex; align-items:center; justify-content:center; aspect-ratio:1;"><img src="../assets/arrow-outline-black.png" style="width:56px; height:auto;"></div>
    <div style="background:var(--ink); border-radius:8px; padding:14px; display:flex; align-items:center; justify-content:center; aspect-ratio:1;"><img src="../assets/arrow-outline-white.png" style="width:56px; height:auto;"></div>
  </div>
  <div style="margin-top:14px; font-size:12px; color:var(--fg-3);">Universal brand glyph — use as icon, bullet, cropped motif, avatar backdrop.</div>
</body></html>
