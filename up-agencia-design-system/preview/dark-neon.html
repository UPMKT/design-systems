<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:0; margin:0;">
  <div style="position:relative; padding:28px; overflow:hidden;
              background: #05050F;">
    <!-- Radial glows -->
    <div style="position:absolute; inset:0; pointer-events:none;
                background:
                  radial-gradient(circle at 20% 30%, rgba(49,60,240,0.35) 0%, transparent 40%),
                  radial-gradient(circle at 85% 75%, rgba(49,60,240,0.22) 0%, transparent 45%);"></div>

    <div style="position:relative;">
      <div style="font-family:var(--font-body); font-weight:600; font-size:11px;
                  letter-spacing:0.18em; text-transform:uppercase;
                  color:rgba(240,240,248,.5); margin-bottom:14px;">Variante Dark · Neon</div>

      <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin-bottom:18px;">
        <div class="swatch" style="background:#05050F; color:#F0F0F8; border:1px solid rgba(49,60,240,.22); min-height:100px;">
          <div><div class="name">Dark BG</div><div style="font-size:11px; opacity:.7;">--dark-bg</div></div>
          <div class="val">#05050F</div>
        </div>
        <div class="swatch" style="background:#080818; color:#F0F0F8; border:1px solid rgba(49,60,240,.22); min-height:100px;">
          <div><div class="name">Dark Surface</div><div style="font-size:11px; opacity:.7;">--dark-bg-2</div></div>
          <div class="val">#080818</div>
        </div>
        <div class="swatch" style="background:#0C0C22; color:#F0F0F8; border:1px solid rgba(49,60,240,.22); min-height:100px;">
          <div><div class="name">Dark Elev.</div><div style="font-size:11px; opacity:.7;">--dark-bg-3</div></div>
          <div class="val">#0C0C22</div>
        </div>
        <div class="swatch" style="background:#F0F0F8; color:#05050F; min-height:100px;">
          <div><div class="name">Off-White</div><div style="font-size:11px; opacity:.7;">--dark-fg-1</div></div>
          <div class="val">#F0F0F8</div>
        </div>
      </div>

      <!-- Glow demo -->
      <div style="display:flex; gap:14px; align-items:center; margin-bottom:18px;">
        <div style="width:90px; height:90px; border-radius:50%; background:#313CF0;
                    box-shadow: 0 0 40px rgba(49,60,240,0.35), 0 0 120px rgba(49,60,240,0.18);"></div>
        <div style="width:90px; height:90px; border-radius:50%; background:#313CF0;
                    box-shadow: 0 0 20px rgba(49,60,240,0.24);"></div>
        <div style="width:90px; height:90px; border-radius:50%; background:rgba(49,60,240,.12);
                    border:1px solid rgba(49,60,240,.4);"></div>
        <div style="color:#F0F0F8; font-size:12px; line-height:1.5;">
          <div style="font-weight:600; margin-bottom:4px;">Glow tokens</div>
          <div style="opacity:.6;">--glow-halo<br>--glow-mid<br>--glow-soft</div>
        </div>
      </div>

      <!-- Typography on dark -->
      <div style="padding:18px; background:#080818; border:1px solid rgba(49,60,240,.22); border-radius:12px;">
        <div style="font-family:'Anton', Impact, sans-serif; font-weight:400;
                    font-size:64px; line-height:0.95; letter-spacing:0.005em;
                    text-transform:uppercase; color:#F0F0F8;">
          Aprenda a<br><span style="color:#5A82FF;">escalar</span> seu negócio
        </div>
        <div style="font-family:var(--font-body); font-size:13px; color:rgba(240,240,248,.7);
                    margin-top:10px;">Anton · 64px · UPPERCASE · para funnels/webinars</div>
      </div>
    </div>
  </div>
</body></html>
