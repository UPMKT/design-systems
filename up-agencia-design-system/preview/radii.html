<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:28px;">
  <div style="display:flex; gap:18px; align-items:flex-end;">
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:0;"></div>
      <div class="meta">0 / none</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:2px;"></div>
      <div class="meta">--r-1 / 2</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:4px;"></div>
      <div class="meta">--r-2 / 4</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:8px;"></div>
      <div class="meta">--r-3 / 8 ★</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:12px;"></div>
      <div class="meta">--r-4 / 12</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:16px;"></div>
      <div class="meta">--r-5 / 16</div>
    </div>
    <div style="display:flex; flex-direction:column; align-items:center; gap:8px;">
      <div style="width:64px; height:64px; background:var(--up-blue); border-radius:999px;"></div>
      <div class="meta">pill (avatars, tags only)</div>
    </div>
  </div>
  <div class="meta" style="margin-top:16px;">★ Default. Never use pill for buttons — they fight the wordmark's square geometry.</div>
</body></html>
