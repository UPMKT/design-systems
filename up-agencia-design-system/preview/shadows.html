<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card.css"></head>
<body style="padding:32px; background:var(--bone);">
  <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:18px;">
    <div style="background:#fff; height:120px; border-radius:8px; padding:14px; display:flex; flex-direction:column; justify-content:flex-end;">
      <div style="font-size:12px; font-weight:600;">Flat</div>
      <div class="meta">--shadow-0</div>
    </div>
    <div style="background:#fff; height:120px; border-radius:8px; padding:14px; display:flex; flex-direction:column; justify-content:flex-end; box-shadow:0 1px 2px rgba(10,10,15,.06), 0 1px 1px rgba(10,10,15,.04);">
      <div style="font-size:12px; font-weight:600;">Hover</div>
      <div class="meta">--shadow-1</div>
    </div>
    <div style="background:#fff; height:120px; border-radius:8px; padding:14px; display:flex; flex-direction:column; justify-content:flex-end; box-shadow:0 4px 12px rgba(10,10,15,.08), 0 1px 2px rgba(10,10,15,.05);">
      <div style="font-size:12px; font-weight:600;">Popover</div>
      <div class="meta">--shadow-2</div>
    </div>
    <div style="background:#fff; height:120px; border-radius:8px; padding:14px; display:flex; flex-direction:column; justify-content:flex-end; box-shadow:0 16px 40px rgba(10,10,15,.12), 0 2px 6px rgba(10,10,15,.06);">
      <div style="font-size:12px; font-weight:600;">Modal</div>
      <div class="meta">--shadow-3</div>
    </div>
  </div>
  <div style="margin-top:20px; display:flex; gap:18px; align-items:center;">
    <button style="background:var(--up-blue); color:#fff; border:0; padding:12px 22px; border-radius:8px; font-family:var(--font-body); font-weight:600; font-size:15px; box-shadow:0 12px 32px rgba(49,60,240,.28); cursor:pointer;">Começar um projeto →</button>
    <div class="meta">--shadow-brand — the glowing halo under primary CTAs on hover.</div>
  </div>
</body></html>
